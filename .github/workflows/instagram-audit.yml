name: Instagram Audit
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python audit.py
        env:
          APIFY_API_KEY:           ${{ secrets.APIFY_API_KEY }}
          INSTAGRAM_HANDLE:        ${{ secrets.INSTAGRAM_HANDLE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
      - name: Commit data.json if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Update post data [skip ci]" && git push)
